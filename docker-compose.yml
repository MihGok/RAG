services:

  # ════════════════════════════════════════════
  #  ИНФРАСТРУКТУРА
  # ════════════════════════════════════════════

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}

  # ════════════════════════════════════════════
  #  LLM ENDPOINT (FastAPI)
  # ════════════════════════════════════════════

  llm-endpoint:
    build: .
    container_name: Fastapi-LLM-Endpoint
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Папки
      MODELS_DIR: /models
      DOWNLOAD_DIR: /tmp/downloads
      WHISPER_MODEL: ${WHISPER_MODEL}
      # llama.cpp GPU
      N_GPU_LAYERS: ${N_GPU_LAYERS}
      N_CTX_DEFAULT: ${N_CTX_DEFAULT}
      # БД
      POSTGRES_DSN: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      MONGO_URI: "mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017"
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      # Gemini
      GEMINI_API_KEY: ${GEMINI_API_KEY}

    volumes:
      # Код — без пересборки при изменениях
      - ./app:/srv/endpoint
      # Модели (только чтение)
      - ./models:/models:ro
      # Временные загрузки видео
      - /tmp/downloads:/tmp/downloads

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]

    depends_on:
      - qdrant
      - postgres
      - mongodb

    command:
      - "/opt/venv/bin/uvicorn"
      - "main:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--workers"
      - "1"
      - "--reload"

# ════════════════════════════════════════════
#  PERSISTENT VOLUMES
# ════════════════════════════════════════════
volumes:
  qdrant_data:
  postgres_data:
  mongo_data:
  mongo_config:
